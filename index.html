<script>
const portfolioData = {
  // 1. Basic Information
  hero: {
    name: "Muhammad Ibrahim",
    role: "AI ENGINEER",
    typedText: "I BUILD SOFTWARE THAT ACTUALLY WORKS | FULL-STACK AI DEVELOPER"
  },

  // 2. Main Links (Buttons & Nav)
  links: {
    github: "https://github.com/muhammadibrahimbsai-2024a-cpu",
    resume: "file:///c%3A/Users/IBRAHIM%20KHAN/Desktop/portfolio/portfolio-hero-concept.html",
    contactEmail: "muhammad.ibrahim.bsai-2024a@cecosian.edu.pk"
  },

  // 3. Marquee Skills (Add or remove skills here)
  skills: [
    "PYTHON", "AI/ML", "DEEP LEARNING", "COMPUTER VISION", 
    "NUMPY", "PANDAS", "MATPLOTLIB", "TENSORFLOW", "PYTORCH"
  ],

  // 4. Projects Showcase (Add new projects to this list)
  projects: [
    {
      title: "AI BASED EMOTION DETECTION SYSTEM",
      description: "A real-time project that track your emotion and your mood ",
      techStack: ["Python", "OpenCV", "CNN"],
      demoLink: "file:///C:/Users/IBRAHIM%20KHAN/Downloads/emotion_detector%20(2).html", // Leave empty string "" if no demo
      githubLink: "https://github.com/muhammadibrahimbsai-2024a-cpu/AI_BASED-EMOTION-DETECTION-"
    },
    {
      title: "AI BASED THERMAL VEGETATION",
      description: "An Java script Html web based prototype it can be used for vegetation it tells the temprature if you click on it and requred plantatyion to control temprature.",
      techStack: ["JavaScript", "leaflet.js", "html", "css"],
      demoLink: "file:///C:/Users/IBRAHIM%20KHAN/Desktop/sbtv_prototype/greensat-vision%20(1).html", // No demo available
      githubLink: "https://github.com/muhammadibrahimbsai-2024a-cpu/AI_BASED-THERMAL-VEGETATION"
    },
    {}
  ]
};

/* ============================================================
   CHATBOT KNOWLEDGE BASE — edit this when you upload your data
   ------------------------------------------------------------
   Fill in the fields below with your real info (plain text /
   short arrays — no logic to touch). The chatbot below matches
   keywords in a visitor's question to one of these topics.
   Leave a field empty ("" or []) and the bot will say that part
   isn't added yet, instead of breaking.
   ============================================================ */
const aboutMeData = {
  // 2-3 sentences, first person, casual tone.
  bio: "Hey, I'm Ibrahim — a 21-year-old AI Engineering student at CECOS University, Peshawar. I'm currently sharpening my model training skills and just started my first internship at DecodeLabs. I like turning ideas into complete, working software rather than half-built demos.",

  quickFacts: {
    age: "21"
  },

  education: [
    // { degree: "...", institution: "...", years: "..." } — add one object per entry
    { degree: "Matriculation", institution: "Working Folks Grammar Higher & Secondary School System", years: "" },
    { degree: "FSc", institution: "Working Folks Grammar Higher & Secondary School System", years: "" },
    { degree: "BS Artificial Intelligence (in progress) — CGPA 3.3", institution: "CECOS University, Peshawar", years: "2024 – present" }
  ],

  experience: [
    // { role: "...", place: "...", duration: "...", summary: "..." }
    { role: "AI Engineering Intern", place: "DecodeLabs", duration: "2026 – present", summary: "First internship — working through an Industrial Training Kit, currently focused on model training." }
  ],

  currentlyLearning: [
    // skills being actively worked on right now
    "Model training"
  ],

  interests: [
    // "Machine learning", "Chess", "Gaming", ...
  ],

  achievements: [
    // "Certification / competition / notable result", ...
  ],

  contact: {
    email: portfolioData.links.contactEmail,
    location: "", // e.g. "Peshawar, Pakistan"
    linkedin: ""  // full URL, optional
  }
};

/* ------------------------------------------------------------
   INTENTS — each one is: a name, a list of trigger keywords,
   and a respond() function that builds the reply from the data
   above. Add a new intent by copying one of these blocks.
   ------------------------------------------------------------ */
const chatIntents = [
  {
    name: "greeting",
    keywords: ["hi", "hello", "hey", "salaam", "assalam", "yo"],
    respond: () => "Hey! I'm a rule-based assistant trained on Ibrahim's data. Ask me about his skills, projects, education, experience, or how to contact him."
  },
  {
    name: "skills",
    keywords: ["skill", "skills", "technology", "technologies", "tech", "stack", "tool", "tools", "language", "languages", "know"],
    respond: () => "Ibrahim works with: " + portfolioData.skills.join(", ") + "."
  },
  {
    name: "projects",
    keywords: ["project", "projects", "built", "build", "made", "work", "portfolio", "github", "repo"],
    respond: () => {
      const list = portfolioData.projects
        .filter(p => p.title)
        .map(p => "• " + p.title + " — " + p.description)
        .join("\n");
      return "Here's what Ibrahim has built:\n" + list;
    }
  },
  {
    name: "education",
    keywords: ["study", "studying", "studies", "university", "degree", "school", "education", "college", "cgpa", "gpa"],
    respond: () => {
      if (!aboutMeData.education.length) return "Education details haven't been added yet.";
      return aboutMeData.education.map(e => e.degree + " — " + e.institution + (e.years ? " (" + e.years + ")" : "")).join("\n");
    }
  },
  {
    name: "age",
    keywords: ["old", "age"],
    respond: () => "I'm " + aboutMeData.quickFacts.age + " years old."
  },
  {
    name: "learning",
    keywords: ["learning", "improving", "practicing", "currently"],
    respond: () => aboutMeData.currentlyLearning.length ? "Right now I'm sharpening: " + aboutMeData.currentlyLearning.join(", ") + "." : "Not added yet."
  },
  {
    name: "experience",
    keywords: ["experience", "job", "internship", "worked", "company", "role"],
    respond: () => {
      if (!aboutMeData.experience.length) return "Experience details haven't been added yet.";
      return aboutMeData.experience.map(e => e.role + " @ " + e.place + " (" + e.duration + ") — " + e.summary).join("\n");
    }
  },
  {
    name: "interests",
    keywords: ["hobby", "hobbies", "interest", "free time", "fun"],
    respond: () => aboutMeData.interests.length ? "Outside of code: " + aboutMeData.interests.join(", ") + "." : "Not added yet."
  },
  {
    name: "contact",
    keywords: ["contact", "email", "reach", "hire", "hiring", "linkedin", "connect", "touch"],
    respond: () => {
      const parts = ["Email: " + aboutMeData.contact.email];
      if (aboutMeData.contact.linkedin) parts.push("LinkedIn: " + aboutMeData.contact.linkedin);
      if (aboutMeData.contact.location) parts.push("Based in: " + aboutMeData.contact.location);
      return parts.join("\n");
    }
  },
  {
    name: "about",
    keywords: ["who", "about you", "yourself", "bio", "introduce", "tell me about"],
    respond: () => aboutMeData.bio
  },
  {
    name: "thanks",
    keywords: ["thanks", "thank you", "thx", "appreciate"],
    respond: () => "You're welcome! Anything else you'd like to know?"
  }
];

const FALLBACK_RESPONSES = [
  "I don't have an answer for that yet — try asking about skills, projects, education, experience, or contact info.",
  "Not sure about that one. I can talk about Ibrahim's skills, projects, background, or how to reach him."
];

function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

// Scores every intent by counting keyword hits in the visitor's
// text (whole-word/phrase matches only, so "hi" won't fire on
// "this" and "yo" won't fire on "you"), and returns the best
// match's response — or a fallback if nothing scores.
function matchIntent(userText) {
  const text = userText.toLowerCase();
  let best = null;
  let bestScore = 0;
  chatIntents.forEach(intent => {
    let score = 0;
    intent.keywords.forEach(k => {
      const re = new RegExp('\\b' + escapeRegex(k.toLowerCase()) + '\\b');
      if (re.test(text)) score++;
    });
    if (score > bestScore) { bestScore = score; best = intent; }
  });
  if (!best) return FALLBACK_RESPONSES[Math.floor(Math.random() * FALLBACK_RESPONSES.length)];
  return best.respond();
}

  @media (max-width: 480px) {
    .chat-panel { right: 16px; bottom: 84px; }

  }
</style>
</head>

  document.getElementById('hero-role').textContent = portfolioData.hero.role;
  document.getElementById('hero-github').href = portfolioData.links.github;
  document.getElementById('nav-contact').href = portfolioData.links.contactEmail;

  // --- 2. TYPED TERMINAL LINE ---
  const text = portfolioData.hero.typedText;
  const el = document.getElementById('typed');
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduced) {
    el.textContent = text;
  } else {
    let i = 0;
    (function type(){
      if (i <= text.length) {
        el.textContent = text.slice(0, i);
        i++;
        setTimeout(type, 38);
      }
    })();
  }

  // --- 3. MARQUEE SKILLS ---
  const html = portfolioData.skills.map(function(t){ 
    return '<span><span class="dot">·</span> ' + t + '</span>'; 
  }).join('');
  document.getElementById('track').innerHTML = html + html;

  // --- 4. POPULATE PROJECTS ---
  const projectsContainer = document.getElementById('projects-container');
  
  portfolioData.projects.filter(project => project.title).forEach(project => {
    // Generate Tech Tags
    const techTags = project.techStack
        .map(tech => `<span class="tech-tag">${tech}</span>`)
        .join('');

    // Generate Buttons (Only show Demo button if a link exists)
    let linksHtml = '';
    if(project.demoLink) {
        linksHtml += `<a href="${project.demoLink}" target="_blank" class="btn btn-primary btn-small">Demo ↗</a>`;
    }
    if(project.githubLink) {
        linksHtml += `<a href="${project.githubLink}" target="_blank" class="btn btn-ghost btn-small">Code ↗</a>`;
    }

    // Build the Card HTML
    const cardHtml = `
      <div class="project-card">
        <h3 class="project-title">${project.title}</h3>
        <p class="project-desc">${project.description}</p>
        <div class="tech-stack">
          ${techTags}
        </div>
        <div class="project-links">
          ${linksHtml}
        </div>
      </div>
    `;

    // Inject into the page
    projectsContainer.innerHTML += cardHtml;
  });
</script>

<!-- Chatbot wiring: uses aboutMeData / chatIntents / matchIntent() defined in <head> -->
<script>
(function initChatbot(){
  const toggle = document.getElementById('chatToggle');
  const panel = document.getElementById('chatPanel');
  const messagesEl = document.getElementById('chatMessages');
  const input = document.getElementById('chatInput');
  const sendBtn = document.getElementById('chatSend');
  const suggestionsWrap = document.getElementById('chatSuggestions');
  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  const SUGGESTIONS = ["Skills", "Projects", "Education", "Contact"];
  let greeted = false;

  function addMessage(text, sender) {
    const div = document.createElement('div');
    div.className = 'msg ' + sender;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addTyping() {
    const div = document.createElement('div');
    div.className = 'msg bot typing';
    div.id = 'typingIndicator';
    div.innerHTML = '<span></span><span></span><span></span>';
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  function respondTo(userText) {
    addMessage(userText, 'user');
    const delay = reducedMotion ? 0 : 420 + Math.random() * 380;
    addTyping();
    setTimeout(() => {
      removeTyping();
      addMessage(matchIntent(userText), 'bot');
    }, delay);
  }

  function renderSuggestions() {
    suggestionsWrap.innerHTML = '';
    SUGGESTIONS.forEach(label => {
      const chip = document.createElement('button');
      chip.className = 'chip';
      chip.type = 'button';
      chip.textContent = label;
      chip.addEventListener('click', () => respondTo(label));
      suggestionsWrap.appendChild(chip);
    });
  }

  function openPanel() {
    panel.classList.add('open');
    toggle.classList.add('open');
    toggle.setAttribute('aria-expanded', 'true');
    if (!greeted) {
      greeted = true;
      addMessage("Hi! I'm a rule-based assistant that knows about Ibrahim. Ask me anything, or tap a suggestion below.", 'bot');
      renderSuggestions();
    }
    input.focus();
  }

  function closePanel() {
    panel.classList.remove('open');
    toggle.classList.remove('open');
    toggle.setAttribute('aria-expanded', 'false');
  }

  toggle.addEventListener('click', () => {
    panel.classList.contains('open') ? closePanel() : openPanel();
  });

  function submit() {
    const val = input.value.trim();
    if (!val) return;
    input.value = '';
    respondTo(val);
  }

  sendBtn.addEventListener('click', submit);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });
})();
</script>
